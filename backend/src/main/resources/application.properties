spring.application.name=mathsmate-backend
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/mathsmate}
spring.data.mongodb.database=mathsmate

# Logging
logging.level.com.mathsmate=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tesseract CLI path (update if installed)
ocr.tesseract.command=tesseract
ocr.enabled=false
